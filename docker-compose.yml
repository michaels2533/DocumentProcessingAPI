services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docproc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docproc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-docproc}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docproc}"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  # A test database for running test data on. 
  test-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: test_db
    ports:
      - "5434:5432" # Uses different port to avoid conflict with the main database.
    volumes:
      - testpgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER:-testuser}"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ["test"] # only starts when you opt-in.

  # Redis broker used by Arq. The API enqueues `process_document_job`
  # messages here; the `worker` service pops them.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/backend_app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Background processing pool. Scale horizontally with
  #   docker compose up --scale worker=N
  # Each worker pulls jobs from Redis, extracts PDF text, runs the LLM
  # classification + embedding pipeline, and writes results to Postgres.
  worker:
    build: ./backend
    command: arq app.workers.arq_worker.WorkerSettings
    env_file:
      - .env
    volumes:
      - ./backend:/backend_app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend_app
      - /frontend_app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  testpgdata:
